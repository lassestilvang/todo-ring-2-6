openapi: 3.1.0
info:
  title: TaskPlanner API
  description: |
    TaskPlanner API for task management with real-time collaboration,
    offline-first architecture, and AI-powered features.

    ## Authentication
    Most endpoints require JWT authentication. Include the token in the Authorization header:
    ```
    Authorization: Bearer <your-jwt-token>
    ```

    ## Rate Limiting
    API requests are rate-limited:
    - Standard: 100 requests per minute per IP
    - Authentication endpoints: 20 requests per minute per IP

    Rate limit headers:
    - `X-RateLimit-Limit`: Maximum requests per window
    - `X-RateLimit-Remaining`: Remaining requests in current window
    - `X-RateLimit-Reset`: Unix timestamp when the window resets
  version: 1.0.0
  contact:
    name: TaskPlanner Support
    email: support@taskplanner.app

servers:
  - url: http://localhost:3000
    description: Development server
  - url: https://api.taskplanner.app
    description: Production server

tags:
  - name: auth
    description: Authentication and user management
  - name: tasks
    description: Task CRUD operations
  - name: lists
    description: List management
  - name: labels
    description: Label management
  - name: teams
    description: Team collaboration
  - name: ai
    description: AI-powered suggestions and automation
  - name: analytics
    description: Productivity analytics and reporting
  - name: notifications
    description: Notification management

paths:
  /api/auth/login:
    post:
      tags: [auth]
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                remember:
                  type: boolean
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/UserSession'
        '401':
          description: Invalid credentials
        '429':
          description: Rate limited

  /api/auth/register:
    post:
      tags: [auth]
      summary: Register new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
      responses:
        '200':
          description: Registration successful
        '400':
          description: Invalid input
        '429':
          description: Rate limited

  /api/tasks:
    get:
      tags: [tasks]
      summary: Get tasks
      parameters:
        - name: view
          in: query
          schema:
            type: string
            enum: [today, next7, overdue, completed, all]
          description: Predefined view filter
        - name: listId
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, in_progress, completed, cancelled]
        - name: date
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: List of tasks
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Task'

    post:
      tags: [tasks]
      summary: Create new task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTask'
      responses:
        '200':
          description: Task created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Task'
        '400':
          description: Invalid input

  /api/tasks/{{id}}:
    get:
      tags: [tasks]
      summary: Get task by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Task details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Task'

    put:
      tags: [tasks]
      summary: Update task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTask'
      responses:
        '200':
          description: Task updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Task'

    delete:
      tags: [tasks]
      summary: Delete task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Task deleted

  /api/lists:
    get:
      tags: [lists]
      summary: Get all lists
      responses:
        '200':
          description: List of lists
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/List'

    post:
      tags: [lists]
      summary: Create list
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                color:
                  type: string
                emoji:
                  type: string
      responses:
        '200':
          description: List created

  /api/ai/suggestions:
    post:
      tags: [ai]
      summary: Get AI task suggestions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                context:
                  type: string
                limit:
                  type: integer
                  default: 3
      responses:
        '200':
          description: AI suggestions
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AISuggestion'
        '429':
          description: Rate limited (AI endpoints have stricter limits)

  /api/analytics/dashboard:
    get:
      tags: [analytics]
      summary: Get dashboard analytics
      parameters:
        - name: range
          in: query
          schema:
            type: string
            enum: [week, month, quarter]
          default: week
      responses:
        '200':
          description: Dashboard analytics
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/DashboardAnalytics'

components:
  schemas:
    Task:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        listId:
          type: string
        date:
          type: string
          format: date
        deadline:
          type: string
          format: date
        priority:
          type: string
          enum: [high, medium, low, none]
        status:
          type: string
          enum: [pending, in_progress, completed, cancelled]
        recurringType:
          type: string
          enum: [none, daily, weekly, weekdays, monthly, yearly, custom]
        isAllDay:
          type: boolean
        isHabit:
          type: boolean
        completedAt:
          type: string
          format: date-time
        assigneeId:
          type: string
        assigneeName:
          type: string
        subtasks:
          type: array
          items:
            $ref: '#/components/schemas/Subtask'
        labels:
          type: array
          items:
            $ref: '#/components/schemas/Label'
        dependencies:
          type: array
          items:
            $ref: '#/components/schemas/TaskDependency'

    CreateTask:
      type: object
      required: [title]
      properties:
        title:
          type: string
        description:
          type: string
        listId:
          type: string
        date:
          type: string
          format: date
        deadline:
          type: string
          format: date
        priority:
          type: string
          enum: [high, medium, low, none]
        recurringType:
          type: string
          enum: [none, daily, weekly, weekdays, monthly, yearly, custom]
        isAllDay:
          type: boolean
        isHabit:
          type: boolean
        assigneeId:
          type: string
        labelIds:
          type: array
          items:
            type: string

    UpdateTask:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        listId:
          type: string
        date:
          type: string
          format: date
        deadline:
          type: string
          format: date
        priority:
          type: string
          enum: [high, medium, low, none]
        status:
          type: string
          enum: [pending, in_progress, completed, cancelled]
        recurringType:
          type: string
          enum: [none, daily, weekly, weekdays, monthly, yearly, custom]
        isAllDay:
          type: boolean
        isHabit:
          type: boolean
        assigneeId:
          type: string
        labelIds:
          type: array
          items:
            type: string

    List:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        color:
          type: string
        emoji:
          type: string
        isInbox:
          type: boolean
        sortOrder:
          type: integer

    Subtask:
      type: object
      properties:
        id:
          type: string
        taskId:
          type: string
        title:
          type: string
        isCompleted:
          type: boolean
        sortOrder:
          type: integer

    Label:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        color:
          type: string
        icon:
          type: string

    TaskDependency:
      type: object
      properties:
        id:
          type: string
        taskId:
          type: string
        dependsOnId:
          type: string
        createdAt:
          type: string
          format: date-time

    AISuggestion:
      type: object
      properties:
        action:
          type: string
        confidence:
          type: number
        reason:
          type: string
        suggestedValue:
          type: object

    UserSession:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
        token:
          type: string
        refreshToken:
          type: string

    User:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        avatar:
          type: string

    DashboardAnalytics:
      type: object
      properties:
        totalTasks:
          type: integer
        completedTasks:
          type: integer
        pendingTasks:
          type: integer
        productivityScore:
          type: number
        streak:
          type: integer