openapi: 3.1.0
info:
  title: TaskPlanner API
  description: |
    TaskPlanner API for task management with real-time collaboration,
    offline-first architecture, and AI-powered features.

    ## Authentication
    Most endpoints require JWT authentication. Include the token in the Authorization header:
    ```
    Authorization: Bearer <your-jwt-token>
    ```

    ## Rate Limiting
    API requests are rate-limited:
    - Standard: 100 requests per minute per IP
    - Authentication endpoints: 20 requests per minute per IP

    Rate limit headers:
    - `X-RateLimit-Limit`: Maximum requests per window
    - `X-RateLimit-Remaining`: Remaining requests in current window
    - `X-RateLimit-Reset`: Unix timestamp when the window resets
  version: 1.0.0
  contact:
    name: TaskPlanner Support
    email: support@taskplanner.app

servers:
  - url: http://localhost:3000
    description: Development server
  - url: https://api.taskplanner.app
    description: Production server

  - url: http://localhost:3000/api/v1
    description: API v1 (stable)

tags:
  - name: auth
    description: Authentication and user management
  - name: tasks
    description: Task CRUD operations
  - name: lists
    description: List management
  - name: labels
    description: Label management
  - name: teams
    description: Team collaboration
  - name: ai
    description: AI-powered suggestions and automation
  - name: analytics
    description: Productivity analytics and reporting
  - name: notifications
    description: Notification management

paths:
  /api/auth/login:
    post:
      tags: [auth]
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                remember:
                  type: boolean
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/UserSession'
        '401':
          description: Invalid credentials
        '429':
          description: Rate limited

  /api/auth/register:
    post:
      tags: [auth]
      summary: Register new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
      responses:
        '200':
          description: Registration successful
        '400':
          description: Invalid input
        '429':
          description: Rate limited

  /api/tasks:
    get:
      tags: [tasks]
      summary: Get tasks
      parameters:
        - name: view
          in: query
          schema:
            type: string
            enum: [today, next7, overdue, completed, all]
          description: Predefined view filter
        - name: listId
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, in_progress, completed, cancelled]
        - name: date
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: List of tasks
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Task'

    post:
      tags: [tasks]
      summary: Create new task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTask'
      responses:
        '200':
          description: Task created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Task'
        '400':
          description: Invalid input

  /api/tasks/{{id}}:
    get:
      tags: [tasks]
      summary: Get task by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Task details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Task'

    put:
      tags: [tasks]
      summary: Update task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTask'
      responses:
        '200':
          description: Task updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Task'

    delete:
      tags: [tasks]
      summary: Delete task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Task deleted

  /api/lists:
    get:
      tags: [lists]
      summary: Get all lists
      responses:
        '200':
          description: List of lists
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/List'

    post:
      tags: [lists]
      summary: Create list
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                color:
                  type: string
                emoji:
                  type: string
      responses:
        '200':
          description: List created

  /api/ai/suggestions:
    post:
      tags: [ai]
      summary: Get AI task suggestions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                context:
                  type: string
                limit:
                  type: integer
                  default: 3
      responses:
        '200':
          description: AI suggestions
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AISuggestion'
        '429':
          description: Rate limited (AI endpoints have stricter limits)

  /api/analytics/dashboard:
    get:
      tags: [analytics]
      summary: Get dashboard analytics
      parameters:
        - name: range
          in: query
          schema:
            type: string
            enum: [week, month, quarter]
          default: week
      responses:
        '200':
          description: Dashboard analytics
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/DashboardAnalytics'

  /api/v1/tasks:
    get:
      tags: [tasks]
      summary: Get tasks (v1)
      description: Retrieve tasks with optional filtering and pagination
      parameters:
        - name: view
          in: query
          schema:
            type: string
            enum: [today, next7, upcoming, all, inbox]
        - name: listId
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: List of tasks
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Task'
                  pagination:
                    $ref: '#/components/schemas/Pagination'

  /api/v1/lists:
    get:
      tags: [lists]
      summary: Get all lists (v1)
      responses:
        '200':
          description: List of lists
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/List'

  /api/v1/time-entries:
    get:
      tags: [time-tracking]
      summary: Get time entries (v1)
      parameters:
        - name: taskId
          in: query
          schema:
            type: string
        - name: period
          in: query
          schema:
            type: string
            enum: [7d, 30d, week, month]
      responses:
        '200':
          description: Time entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/TimeEntry'

  /api/v1/auth/login:
    post:
      tags: [auth]
      summary: Login (v1)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/User'
                      token:
                        type: string

  /api/v1/tasks/{id}:
    get:
      tags: [tasks]
      summary: Get task by ID (v1)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Task details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Task'
        '404':
          description: Task not found

  /api/v1/comments:
    get:
      tags: [comments]
      summary: Get comments (v1)
      parameters:
        - name: taskId
          in: query
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of comments
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Comment'

  /api/v1/comments/{commentId}/reactions:
    get:
      tags: [comments]
      summary: Get reactions for a comment (v1)
      parameters:
        - name: commentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of reactions
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CommentReaction'

  /api/v1/saved-views:
    get:
      tags: [saved-views]
      summary: Get saved views (v1)
      responses:
        '200':
          description: List of saved views
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/SavedView'

  /api/v1/analytics/dashboard:
    get:
      tags: [analytics]
      summary: Get dashboard analytics (v1)
      parameters:
        - name: range
          in: query
          schema:
            type: string
            enum: [week, month, quarter]
          default: week
      responses:
        '200':
          description: Dashboard analytics
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/DashboardAnalytics'

  /api/v1/webhooks:
    post:
      tags: [webhooks]
      summary: Register webhook (v1)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url, events]
              properties:
                url:
                  type: string
                  format: uri
                events:
                  type: array
                  items:
                    type: string
                secret:
                  type: string
      responses:
        '201':
          description: Webhook registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Webhook'

components:
  schemas:
    Pagination:
      type: object
      properties:
        limit:
          type: integer
        cursor:
          type: string
        hasMore:
          type: boolean
    TimeEntry:
      type: object
      properties:
        id:
          type: string
        taskId:
          type: string
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        duration:
          type: number
        description:
          type: string

components:
  schemas:
    Task:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        listId:
          type: string
        date:
          type: string
          format: date
        deadline:
          type: string
          format: date
        priority:
          type: string
          enum: [high, medium, low, none]
        status:
          type: string
          enum: [pending, in_progress, completed, cancelled]
        recurringType:
          type: string
          enum: [none, daily, weekly, weekdays, monthly, yearly, custom]
        isAllDay:
          type: boolean
        isHabit:
          type: boolean
        completedAt:
          type: string
          format: date-time
        assigneeId:
          type: string
        assigneeName:
          type: string
        subtasks:
          type: array
          items:
            $ref: '#/components/schemas/Subtask'
        labels:
          type: array
          items:
            $ref: '#/components/schemas/Label'
        dependencies:
          type: array
          items:
            $ref: '#/components/schemas/TaskDependency'

    CreateTask:
      type: object
      required: [title]
      properties:
        title:
          type: string
        description:
          type: string
        listId:
          type: string
        date:
          type: string
          format: date
        deadline:
          type: string
          format: date
        priority:
          type: string
          enum: [high, medium, low, none]
        recurringType:
          type: string
          enum: [none, daily, weekly, weekdays, monthly, yearly, custom]
        isAllDay:
          type: boolean
        isHabit:
          type: boolean
        assigneeId:
          type: string
        labelIds:
          type: array
          items:
            type: string

    UpdateTask:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        listId:
          type: string
        date:
          type: string
          format: date
        deadline:
          type: string
          format: date
        priority:
          type: string
          enum: [high, medium, low, none]
        status:
          type: string
          enum: [pending, in_progress, completed, cancelled]
        recurringType:
          type: string
          enum: [none, daily, weekly, weekdays, monthly, yearly, custom]
        isAllDay:
          type: boolean
        isHabit:
          type: boolean
        assigneeId:
          type: string
        labelIds:
          type: array
          items:
            type: string

    List:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        color:
          type: string
        emoji:
          type: string
        isInbox:
          type: boolean
        sortOrder:
          type: integer

    Subtask:
      type: object
      properties:
        id:
          type: string
        taskId:
          type: string
        title:
          type: string
        isCompleted:
          type: boolean
        sortOrder:
          type: integer

    Label:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        color:
          type: string
        icon:
          type: string

    TaskDependency:
      type: object
      properties:
        id:
          type: string
        taskId:
          type: string
        dependsOnId:
          type: string
        createdAt:
          type: string
          format: date-time

    AISuggestion:
      type: object
      properties:
        action:
          type: string
        confidence:
          type: number
        reason:
          type: string
        suggestedValue:
          type: object

    UserSession:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
        token:
          type: string
        refreshToken:
          type: string

    User:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        avatar:
          type: string

    DashboardAnalytics:
      type: object
      properties:
        totalTasks:
          type: integer
        completedTasks:
          type: integer
        pendingTasks:
          type: integer
        productivityScore:
          type: number
        streak:
          type: integer

    Subtask:
      type: object
      properties:
        id:
          type: string
          format: uuid
        taskId:
          type: string
          format: uuid
        title:
          type: string
        isCompleted:
          type: boolean
        sortOrder:
          type: integer
        createdAt:
          type: string
          format: date-time

    Comment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        taskId:
          type: string
          format: uuid
        userId:
          type: string
        userName:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time

    CommentReaction:
      type: object
      properties:
        id:
          type: string
          format: uuid
        commentId:
          type: string
          format: uuid
        userId:
          type: string
        emoji:
          type: string
        createdAt:
          type: string
          format: date-time

    SavedView:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        icon:
          type: string
        filters:
          type: object
        userId:
          type: string
        createdAt:
          type: string
          format: date-time

    Webhook:
      type: object
      properties:
        id:
          type: string
          format: uuid
        url:
          type: string
          format: uri
        events:
          type: array
          items:
            type: string
        secret:
          type: string
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time

    TimeEntry:
      type: object
      properties:
        id:
          type: string
          format: uuid
        taskId:
          type: string
          format: uuid
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        duration:
          type: number
        description:
          type: string