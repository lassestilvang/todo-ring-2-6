name: Secret Rotation
on:
  schedule:
    - cron: '0 2 * * *'   # Daily at 02:00 UTC
jobs:
  rotate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: node scripts/rotate-secrets.ts